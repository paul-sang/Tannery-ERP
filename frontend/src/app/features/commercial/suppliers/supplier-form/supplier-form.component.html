<app-modal 
  [title]="isEditMode ? 'Edit Supplier' : 'Create New Supplier'" 
  [isOpen]="isOpen" 
  (close)="closeForm.emit()">
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    
    <div>
      <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Company Name *</label>
      <input type="text" id="name" formControlName="name" 
             class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
             placeholder="e.g. ChemTech Industries"
             [ngClass]="{'border-red-300 focus:ring-red-500 focus:border-red-500': form.get('name')?.invalid && form.get('name')?.touched}">
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <p class="mt-1 text-xs text-red-500">Name is required.</p>
      }
    </div>

    <div>
      <label for="tax_id" class="block text-sm font-medium text-slate-700 mb-1">Tax ID / RUC</label>
      <input type="text" id="tax_id" formControlName="tax_id" 
             class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
             placeholder="e.g. 20102030405">
    </div>

    <div>
      <label for="contact_info" class="block text-sm font-medium text-slate-700 mb-1">Contact Information</label>
      <textarea id="contact_info" formControlName="contact_info" rows="3"
                class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                placeholder="Phone, Email, Address..."></textarea>
    </div>

    <!-- Footer Action Area -->
    <div modal-footer class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-end space-x-3 rounded-b-xl leading-none">
      <button type="button" (click)="closeForm.emit()"
              class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer transition">
        Cancel
      </button>
      <button type="submit" [disabled]="isSubmitting"
              class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition">
        @if (isSubmitting) {
          <span class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving...
          </span>
        } @else {
          {{ isEditMode ? 'Update Supplier' : 'Create Supplier' }}
        }
      </button>
    </div>

  </form>
</app-modal>
