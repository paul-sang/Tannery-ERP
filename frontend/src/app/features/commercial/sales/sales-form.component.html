<app-modal 
  [title]="'Create Sales Order'" 
  [isOpen]="isOpen" 
  (close)="closeForm.emit()">
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <!-- SO Number & Customer -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label for="so_number" class="block text-sm font-medium text-text mb-1">SO Number *</label>
        <input type="text" id="so_number" formControlName="so_number" 
               class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
               placeholder="e.g. SO-2026-888"
               [ngClass]="{'border-danger focus:ring-danger focus:border-primary': form.get('so_number')?.invalid && form.get('so_number')?.touched}">
        @if (form.get('so_number')?.invalid && form.get('so_number')?.touched) {
          <p class="mt-1 text-xs text-danger">SO Number is required.</p>
        }
      </div>

      <div>
        <label for="customer" class="block text-sm font-medium text-text mb-1">Client / Customer *</label>
        <select id="customer" formControlName="customer" 
                class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface"
                [ngClass]="{'border-danger focus:ring-danger focus:border-primary': form.get('customer')?.invalid && form.get('customer')?.touched}">
          <option [ngValue]="null" disabled selected>Select Customer...</option>
          @for (cust of customers; track cust.id) {
            <option [ngValue]="cust.id">[{{ cust.code }}] {{ cust.name }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Status & Timing -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      
      <div>
        <label for="order_date" class="block text-sm font-medium text-text mb-1">Order Date *</label>
        <input type="date" id="order_date" formControlName="order_date" 
               class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface text-text-muted">
      </div>

      <div>
        <label for="expected_dispatch" class="block text-sm font-medium text-text mb-1">Expected Dispatch</label>
        <input type="date" id="expected_dispatch" formControlName="expected_dispatch" 
               class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface text-text-muted">
      </div>

      <div>
        <label for="status" class="block text-sm font-medium text-text mb-1">Status *</label>
        <select id="status" formControlName="status" 
                class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface">
          @for (s of statusOptions; track s) {
            <option [ngValue]="s">{{ s }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Footer Action Area -->
    <div modal-footer class="px-6 py-4 bg-surface-alt border-t border-border flex items-center justify-end space-x-3 rounded-b-xl leading-none">
      <button type="button" (click)="closeForm.emit()"
              class="px-4 py-2 text-sm font-medium text-text bg-surface border border-border rounded-lg hover:bg-surface-alt focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer transition">
        Cancel
      </button>
      <button type="submit" [disabled]="isSubmitting"
              class="px-4 py-2 text-sm font-medium text-white bg-primary border border-transparent rounded-lg hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition">
        @if (isSubmitting) {
          <span class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving...
          </span>
        } @else {
          Create SO
        }
      </button>
    </div>

  </form>
</app-modal>
