<div class="animate-fade-in-up">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-semibold text-text">Production Batches</h1>
      <p class="mt-1 text-sm text-text-muted">Active and completed production runs with material traceability.</p>
    </div>
    <button (click)="openForm()" class="flex items-center px-4 py-2 shadow-sm text-sm font-medium rounded-md text-white bg-primary hover:bg-primary/90 transition cursor-pointer">
      <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Batch
    </button>
  </div>

  <!-- Status filter tabs -->
  <div class="border-b border-border mb-5">
    <nav class="-mb-px flex space-x-4 overflow-x-auto">
      @for (tab of statusTabs; track tab.key) {
        <button (click)="setStatusFilter(tab.key)"
          [ngClass]="activeStatus() === tab.key ? 'border-primary text-primary' : 'border-transparent text-text-muted hover:text-text hover:border-border'"
          class="whitespace-nowrap py-2.5 px-1 border-b-2 font-medium text-sm cursor-pointer transition">
          {{ tab.label }}
        </button>
      }
    </nav>
  </div>

  <!-- Search and Filter -->
  <div class="mb-4 flex gap-3">
    <div class="relative rounded-md shadow-sm max-w-md flex-1">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-4 w-4 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <input type="text" [formControl]="searchControl" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-border rounded-md h-full py-2 border" placeholder="Search batches...">
    </div>

    <button (click)="openFilters()" class="flex items-center justify-center px-4 py-2 border border-border shadow-sm text-sm font-medium rounded-md text-text bg-surface hover:bg-surface-alt transition cursor-pointer">
      <svg class="mr-2 h-4 w-4 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
      </svg>
      Filter
    </button>
  </div>

  <app-data-table
    [columns]="tableColumns" [data]="batches()" [loading]="isLoading()"
    [totalCount]="totalItems()" [currentPage]="currentPage()" [pageSize]="pageSize()"
    (onPageChange)="onPageChange($event)" (onPageSizeChange)="onPageSizeChange($event)"
    (onRowClick)="onRowClick($event)" (onSort)="onSort($event)">
  </app-data-table>

  <app-batch-form [isOpen]="isFormOpen()" (closeForm)="closeForm()" (batchSaved)="onBatchSaved()"></app-batch-form>

  <!-- Advanced Filters Offcanvas -->
  <app-offcanvas 
    [isOpen]="isFilterOpen()" 
    title="Advanced Filters" 
    (closeOffcanvas)="closeFilters()">
    
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-text">Production Stage</label>
        <select [formControl]="filterStageControl" class="mt-1 border block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md">
          <option value="">All Stages</option>
          <option *ngFor="let stage of stages()" [value]="stage.id">{{ stage.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-text">Recipe (Process)</label>
        <select [formControl]="filterProcessControl" class="mt-1 border block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md">
          <option value="">All Recipes</option>
          <option *ngFor="let proc of processesList()" [value]="proc.id">{{ proc.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-text">Manager</label>
        <select [formControl]="filterManagerControl" class="mt-1 border block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md">
          <option value="">All Managers</option>
          <option *ngFor="let m of managers()" [value]="m.id">{{ m.first_name }} {{ m.last_name }} ({{ m.username }})</option>
        </select>
      </div>
      
      <div class="pt-4 border-t border-border flex justify-end space-x-3">
        <button type="button" (click)="clearFilters()" class="cursor-pointer px-4 py-2 border border-border shadow-sm text-sm font-medium rounded-md text-text bg-surface hover:bg-surface-alt focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          Clear
        </button>
        <button type="button" (click)="applyFilters()" class="cursor-pointer px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          Apply Filters
        </button>
      </div>
    </div>
  </app-offcanvas>

</div>
