<app-modal title="New Production Batch" [isOpen]="isOpen" (close)="closeForm.emit()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-xs font-medium text-text mb-1">Recipe (Process) *</label>
      <select formControlName="process" class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface">
        <option [ngValue]="null" disabled>Select a recipe...</option>
        @for (p of processes; track p.id) {
          <option [ngValue]="p.id">{{ p.name }} ({{ p.stage_name }})</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-text mb-1">Notes</label>
      <textarea formControlName="notes" rows="2" class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:ring-2 focus:ring-primary focus:border-primary text-sm" placeholder="Optional notes..."></textarea>
    </div>
    <p class="text-xs text-text-muted">Batch number will be auto-generated. Status starts as Pending.</p>

    <div modal-footer class="px-6 py-4 bg-surface-alt border-t border-border flex justify-end gap-3 rounded-b-xl">
      <button type="button" (click)="closeForm.emit()" class="px-4 py-2 text-sm font-medium text-text bg-surface border border-border rounded-lg hover:bg-surface-alt cursor-pointer transition">Cancel</button>
      <button type="submit" [disabled]="isSubmitting" class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary/90 cursor-pointer disabled:opacity-50 transition">
        {{ isSubmitting ? 'Creating...' : 'Create Batch' }}
      </button>
    </div>
  </form>
</app-modal>
