<div class="animate-fade-in-up">
  
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-semibold text-text">Production Recipes</h1>
      <p class="mt-1 text-sm text-text-muted">Master configurations for tanning operations, chemicals, and expected outputs.</p>
    </div>
    
    <div class="flex gap-3">
      <div class="relative rounded-md shadow-sm">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-4 w-4 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input type="text" [formControl]="searchControl" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-border rounded-md h-full py-2 border" placeholder="Search recipes...">
      </div>

      <button class="flex items-center justify-center px-4 py-2 border border-border shadow-sm text-sm font-medium rounded-md text-text bg-surface hover:bg-surface-alt transition cursor-pointer">
        <svg class="mr-2 h-4 w-4 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        Filter
      </button>

      <button (click)="openForm()" class="flex items-center justify-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary hover:bg-primary/90 transition cursor-pointer">
        <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Recipe
      </button>
    </div>
  </div>

  <app-data-table 
    [columns]="tableColumns" 
    [data]="processes()" 
    [loading]="isLoading()"
    [totalCount]="totalItems()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    (onPageChange)="onPageChange($event)"
    (onPageSizeChange)="onPageSizeChange($event)"
    (onRowClick)="onRowClick($event)"
    (onSort)="onSort($event)">
  </app-data-table>

  <!-- Recipe Form Modal -->
  <app-process-form 
    [isOpen]="isFormOpen()"
    (closeForm)="closeForm()"
    (processSaved)="onProcessSaved()">
  </app-process-form>

</div>
