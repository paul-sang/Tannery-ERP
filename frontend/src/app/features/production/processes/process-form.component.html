<app-modal 
  [title]="'Create Production Recipe'" 
  [isOpen]="isOpen" 
  (close)="closeForm.emit()">
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <!-- Code & Name -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      <div class="col-span-1">
        <label for="code" class="block text-sm font-medium text-text mb-1">Process Code *</label>
        <input type="text" id="code" formControlName="code" 
               class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
               placeholder="e.g. TR-01"
               [ngClass]="{'border-danger focus:ring-danger focus:border-primary': form.get('code')?.invalid && form.get('code')?.touched}">
        @if (form.get('code')?.invalid && form.get('code')?.touched) {
          <p class="mt-1 text-xs text-danger">Code is required.</p>
        }
      </div>
      
      <div class="col-span-2">
        <label for="name" class="block text-sm font-medium text-text mb-1">Recipe Name *</label>
        <input type="text" id="name" formControlName="name" 
               class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
               placeholder="e.g. Standard Chrome Tanning">
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="mt-1 text-xs text-danger">Name is required.</p>
        }
      </div>
    </div>

    <!-- Stage & Item -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label for="stage" class="block text-sm font-medium text-text mb-1">Production Stage *</label>
        <select id="stage" formControlName="stage" 
                class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface"
                [ngClass]="{'border-danger focus:ring-danger focus:border-primary': form.get('stage')?.invalid && form.get('stage')?.touched}">
          <option [ngValue]="null" disabled selected>Select stage...</option>
          @for (st of stages; track st.id) {
            <option [ngValue]="st.id">{{ st.order }}. {{ st.name }}</option>
          }
        </select>
      </div>

      <div>
        <label for="target_item" class="block text-sm font-medium text-text mb-1">Target Finished Item (Optional)</label>
        <select id="target_item" formControlName="target_item" 
                class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-surface">
          <option [ngValue]="null">No specific target</option>
          @for (itm of items; track itm.id) {
            <option [ngValue]="itm.id">[{{ itm.sku }}] {{ itm.name }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Settings -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 items-end">
      <div>
        <label for="approximate_duration_hours" class="block text-sm font-medium text-text mb-1">Approx. Duration (Hours) *</label>
        <div class="relative">
          <input type="number" id="approximate_duration_hours" formControlName="approximate_duration_hours" min="0" step="0.5"
                 class="w-full px-3 py-2 border border-border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm">
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
            <span class="text-text-muted sm:text-sm">hrs</span>
          </div>
        </div>
      </div>

      <div class="flex items-center mb-2">
        <input id="is_active" type="checkbox" formControlName="is_active" 
               class="h-4 w-4 text-primary focus:ring-primary border-border rounded">
        <label for="is_active" class="ml-2 block text-sm text-text">
          Process is active and ready for use
        </label>
      </div>
    </div>

    <!-- Footer Action Area -->
    <div modal-footer class="px-6 py-4 bg-surface-alt border-t border-border flex items-center justify-end space-x-3 rounded-b-xl leading-none">
      <button type="button" (click)="closeForm.emit()"
              class="px-4 py-2 text-sm font-medium text-text bg-surface border border-border rounded-lg hover:bg-surface-alt focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer transition">
        Cancel
      </button>
      <button type="submit" [disabled]="isSubmitting"
              class="px-4 py-2 text-sm font-medium text-white bg-primary border border-transparent rounded-lg hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition">
        @if (isSubmitting) {
          <span class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving...
          </span>
        } @else {
          Create Recipe
        }
      </button>
    </div>

  </form>
</app-modal>
