<div *ngIf="isOpen" class="relative z-50">
  
  <!-- Backdrop -->
  <div 
    class="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity"
    [ngClass]="{'opacity-100': isOpen, 'opacity-0': !isOpen}"
    (click)="close()">
  </div>

  <div class="fixed inset-0 overflow-hidden">
    <div class="absolute inset-0 overflow-hidden">
      <!-- Offcanvas panel -->
      <div 
        class="fixed inset-y-0 right-0 flex max-w-full pl-10 sm:pl-16 transform transition ease-in-out duration-500 sm:duration-700"
        [ngClass]="{'translate-x-0 pointer-events-auto': isOpen, 'translate-x-full pointer-events-none': !isOpen}">
        
        <div class="w-screen max-w-md">
          <div class="flex h-full flex-col overflow-y-scroll bg-surface shadow-xl">
            
            <!-- Header -->
            <div class="px-6 py-6 border-b border-border flex items-center justify-between">
              <h2 class="text-xl font-semibold text-text tracking-tight">{{ title }}</h2>
              <div class="ml-3 flex h-7 items-center">
                <button type="button" (click)="close()" class="rounded-full bg-surface-alt p-2 text-text-muted hover:bg-border hover:text-text focus:outline-none focus:ring-2 focus:ring-primary transition-colors">
                  <span class="sr-only">Close panel</span>
                  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Content Slot -->
            <div class="relative flex-1 px-6 py-8">
              <ng-content></ng-content>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
