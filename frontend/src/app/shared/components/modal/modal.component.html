<!-- Overlay with backdrop transition -->
@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto overflow-x-hidden bg-black/50 backdrop-blur-sm transition-opacity"
       aria-labelledby="modal-title" 
       role="dialog" 
       aria-modal="true"
       (click)="onClose()">
       
    <!-- Modal panel -->
    <div class="relative w-full {{ maxWidthClass }} p-4 mx-auto my-8 transform transition-all animate-fade-in-up"
         (click)="onContentClick($event)">
      
      <!-- Modal content -->
      <div class="relative bg-surface rounded-xl shadow-2xl border border-border overflow-hidden flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="flex items-start justify-between p-5 border-b border-border bg-surface-alt rounded-t-xl shrink-0">
          <h3 class="text-xl font-semibold text-text" id="modal-title">
            {{ title }}
          </h3>
          <button type="button" 
                  (click)="onClose()"
                  class="text-text-muted bg-transparent hover:bg-border hover:text-text rounded-lg text-sm p-1.5 ml-auto inline-flex items-center transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
            </svg>
          </button>
        </div>
        
        <!-- Body (Scrollable) -->
        <div class="p-6 overflow-y-auto grow">
          <ng-content></ng-content>
        </div>
        
        <!-- Footer (Projected from host if needed) -->
        <ng-content select="[modal-footer]"></ng-content>

      </div>
    </div>
  </div>
}
