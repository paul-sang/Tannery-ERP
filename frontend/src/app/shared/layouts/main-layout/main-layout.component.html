<div class="h-screen flex overflow-hidden bg-gray-100 font-sans">
  <app-toast-container />
  
  <!-- Sidebar -->
  <div 
    class="flex flex-col w-64 bg-slate-900 transition-all duration-300 ease-in-out"
    [ngClass]="{'w-64': isSidebarOpen, 'w-20': !isSidebarOpen}">
    
    <!-- Logo Area -->
    <div class="flex items-center justify-center h-16 bg-slate-950 px-4">
      <span class="text-white text-xl font-bold tracking-wider truncate transition-all" *ngIf="isSidebarOpen">
        TANNERY ERP
      </span>
      <span class="text-white text-xl font-bold tracking-wider" *ngIf="!isSidebarOpen">
        TE
      </span>
    </div>

    <!-- Navigation Area -->
    <div class="flex-1 overflow-y-auto mt-4 px-2 space-y-1">
      
      <a routerLink="/dashboard" routerLinkActive="bg-slate-800 text-white" 
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span *ngIf="isSidebarOpen">Dashboard</span>
      </a>

      <a routerLink="/inventory" routerLinkActive="bg-slate-800 text-white" 
         [routerLinkActiveOptions]="{exact: true}"
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        <span *ngIf="isSidebarOpen">Items Catalog</span>
      </a>

      <a routerLink="/inventory/lots" routerLinkActive="bg-slate-800 text-white" 
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <span *ngIf="isSidebarOpen">Stock Lots Tracker</span>
      </a>

      <div class="pt-4 mt-4 border-t border-slate-700/50">
        <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" *ngIf="isSidebarOpen">Production</p>
        <a routerLink="/production/recipes" routerLinkActive="bg-slate-800 text-white" 
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer">
          <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
          <span *ngIf="isSidebarOpen">Formulations</span>
        </a>

        <a routerLink="/production/batches" routerLinkActive="bg-slate-800 text-white" 
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer mt-1">
          <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span *ngIf="isSidebarOpen">Execution Tracker</span>
        </a>
      </div>

      <div class="pt-4 mt-4 border-t border-slate-700/50">
        <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" *ngIf="isSidebarOpen">Commercial</p>
        <a routerLink="/commercial/purchases" routerLinkActive="bg-slate-800 text-white" 
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer">
          <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span *ngIf="isSidebarOpen">Purchase Orders</span>
        </a>
        
        <a routerLink="/commercial/sales" routerLinkActive="bg-slate-800 text-white" 
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer mt-1">
          <svg class="mr-3 h-6 w-6 text-slate-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span *ngIf="isSidebarOpen">Sales Orders</span>
        </a>
      </div>
      
      <!-- More links can be added here -->

    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex flex-col w-0 flex-1 overflow-hidden">
    
    <!-- Top Header -->
    <div class="relative z-10 flex-shrink-0 flex h-16 bg-white shadow-sm border-b border-gray-200">
      <button (click)="toggleSidebar()" type="button" class="px-4 text-gray-500 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 hover:text-gray-900 cursor-pointer transition-colors">
        <span class="sr-only">Toggle sidebar</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="flex-1 px-4 flex justify-between">
        <div class="flex-1 flex items-center">
          <!-- Optional global search bar -->
        </div>
        <div class="ml-4 flex items-center md:ml-6 space-x-4">
          
          <button (click)="toggleLanguage()" class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-md text-gray-700 font-medium transition cursor-pointer">
            {{ translationService.currentLang === 'en' ? 'ES' : 'EN' }}
          </button>

          <!-- User Profile Dropdown Simulator -->
          <button (click)="logout()" class="flex items-center text-sm font-medium text-gray-700 hover:text-red-600 transition cursor-pointer">
            <svg class="mr-1 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
          </button>

        </div>
      </div>
    </div>

    <!-- Main router outlet -->
    <main class="flex-1 relative overflow-y-auto focus:outline-none bg-slate-50">
      <div class="py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
          <!-- Yields dynamic content based on route -->
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>
  </div>
</div>
