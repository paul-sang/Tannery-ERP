<div class="h-screen flex overflow-hidden bg-background font-sans">
  <app-toast-container />
  
  <!-- Mobile Sidebar Backdrop -->
  @if (isMobile && isSidebarOpen) {
    <div 
      class="fixed inset-0 z-30 bg-black/50 backdrop-blur-sm transition-opacity md:hidden"
      (click)="closeSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <div 
    class="flex flex-col bg-sidebar transition-all duration-300 ease-in-out z-40"
    [ngClass]="{
      'fixed inset-y-0 left-0 w-64': isMobile,
      'w-64': !isMobile && isSidebarOpen,
      'w-20': !isMobile && !isSidebarOpen,
      '-translate-x-full': isMobile && !isSidebarOpen,
      'translate-x-0': isMobile && isSidebarOpen
    }">
    
    <!-- Logo Area -->
    <div class="flex items-center justify-center h-16 bg-sidebar/80 border-b border-sidebar-border px-4">
      <span class="text-sidebar-foreground text-xl font-bold tracking-wider truncate transition-all" *ngIf="isSidebarOpen || isMobile">
        PIELES DEL SUR
      </span>
      <span class="text-sidebar-foreground text-xl font-bold tracking-wider" *ngIf="!isSidebarOpen && !isMobile">
        PS
      </span>
    </div>

    <!-- Navigation Area -->
    <div class="flex-1 overflow-y-auto mt-4 px-2 space-y-1">
      
      <a routerLink="/dashboard" routerLinkActive="bg-sidebar-active text-white" 
         (click)="onNavClick()"
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span *ngIf="isSidebarOpen || isMobile">Dashboard</span>
      </a>

      <a routerLink="/inventory" routerLinkActive="bg-sidebar-active text-white" 
         [routerLinkActiveOptions]="{exact: true}"
         (click)="onNavClick()"
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        <span *ngIf="isSidebarOpen || isMobile">Items Catalog</span>
      </a>

      <a routerLink="/inventory/lots" routerLinkActive="bg-sidebar-active text-white" 
         (click)="onNavClick()"
         class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer">
        <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <span *ngIf="isSidebarOpen || isMobile">Stock Tracker</span>
      </a>

      <div class="pt-4 mt-4 border-t border-sidebar-border">
        <p class="px-3 text-xs font-semibold text-sidebar-muted uppercase tracking-wider mb-2" *ngIf="isSidebarOpen || isMobile">Production</p>
        <a routerLink="/production/recipes" routerLinkActive="bg-sidebar-active text-white" 
           (click)="onNavClick()"
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer">
          <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
          <span *ngIf="isSidebarOpen || isMobile">Formulations</span>
        </a>

        <a routerLink="/production/batches" routerLinkActive="bg-sidebar-active text-white" 
           (click)="onNavClick()"
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer mt-1">
          <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span *ngIf="isSidebarOpen || isMobile">Execution Tracker</span>
        </a>
      </div>

      <div class="pt-4 mt-4 border-t border-sidebar-border">
        <p class="px-3 text-xs font-semibold text-sidebar-muted uppercase tracking-wider mb-2" *ngIf="isSidebarOpen || isMobile">Commercial</p>
        <a routerLink="/commercial/purchases" routerLinkActive="bg-sidebar-active text-white" 
           (click)="onNavClick()"
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer">
          <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span *ngIf="isSidebarOpen || isMobile">Purchase Orders</span>
        </a>
        
        <a routerLink="/commercial/sales" routerLinkActive="bg-sidebar-active text-white" 
           (click)="onNavClick()"
           class="group flex items-center px-2 py-3 text-sm font-medium rounded-md text-sidebar-foreground hover:bg-sidebar-hover hover:text-white transition-colors cursor-pointer mt-1">
          <svg class="mr-3 h-6 w-6 text-sidebar-muted group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span *ngIf="isSidebarOpen || isMobile">Sales Orders</span>
        </a>
      </div>
      
      <!-- More links can be added here -->

    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex flex-col w-0 flex-1 overflow-hidden">
    
    <!-- Top Header -->
    <div class="relative z-10 flex-shrink-0 flex h-16 bg-surface shadow-sm border-b border-border">
      <button (click)="toggleSidebar()" type="button" class="px-4 text-text-muted focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary hover:text-text cursor-pointer transition-colors">
        <span class="sr-only">Toggle sidebar</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="flex-1 px-4 flex justify-between">
        <div class="flex-1 flex items-center">
          <!-- Optional global search bar -->
        </div>
        <div class="ml-4 flex items-center md:ml-6 space-x-3">
          
          <!-- Theme Toggle -->
          <button (click)="toggleTheme()" class="relative p-2 text-text-muted hover:text-text rounded-lg hover:bg-surface-alt transition cursor-pointer" title="Toggle dark mode">
            <!-- Sun icon (shown in dark mode) -->
            <svg *ngIf="themeService.isDarkMode()" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg *ngIf="!themeService.isDarkMode()" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>

          <button (click)="toggleLanguage()" class="px-3 py-1 text-sm bg-surface-alt hover:bg-border rounded-md text-text-muted font-medium transition cursor-pointer">
            {{ translationService.currentLang === 'en' ? 'ES' : 'EN' }}
          </button>

          <!-- Logout -->
          <button (click)="logout()" class="flex items-center text-sm font-medium text-text-muted hover:text-danger transition cursor-pointer">
            <svg class="mr-1 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="hidden sm:inline">Logout</span>
          </button>

        </div>
      </div>
    </div>

    <!-- Main router outlet -->
    <main class="flex-1 relative overflow-y-auto focus:outline-none bg-background">
      <div class="py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
          <!-- Yields dynamic content based on route -->
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>
  </div>
</div>
